trigger:
  branches:
    include:
      - '*'

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  AZURE_REPO_URL: 'https://dev.azure.com/FirstStepProjects/SugarFeetProject/_git/SugarFeet'

steps:
  - checkout: none

  - bash: |
      set -euo pipefail

      if [ -z "${GITHUB_PAT:-}" ]; then
        echo "GITHUB_PAT pipeline variable is not set."
        exit 1
      fi

      git -c http.extraheader="AUTHORIZATION: bearer ${SYSTEM_ACCESSTOKEN}" \
        clone --mirror "${AZURE_REPO_URL}" SugarFeet.git

      cd SugarFeet.git

      git remote add github "https://x-access-token:${GITHUB_PAT}@github.com/Pappas313/SugarFeet.git"

      git push --force --prune github 'refs/heads/*:refs/heads/*'
      git push --force --prune github 'refs/tags/*:refs/tags/*'
    displayName: 'Mirror Azure Repos to GitHub'
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      GITHUB_PAT: $(GITHUB_PAT)