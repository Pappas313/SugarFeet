trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

steps:

# =========================
# 1. Checkout
# =========================
- checkout: self
  clean: true

# =========================
# 2. Show repo structure (DEBUG FIX)
# =========================
- script: ls -R
  displayName: 'Show repository structure'

# =========================
# 3. Install .NET
# =========================
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

# =========================
# 4. Restore (FIXED PATH SAFE)
# =========================
- task: DotNetCoreCLI@2
  displayName: 'Restore'
  inputs:
    command: 'restore'
    projects: '**/SugarFeet.sln'

# =========================
# 5. Build
# =========================
- task: DotNetCoreCLI@2
  displayName: 'Build'
  inputs:
    command: 'build'
    projects: '**/SugarFeet.sln'
    arguments: '--configuration $(buildConfiguration)'

# =========================
# 6. Publish API (SAFE PATH)
# =========================
- task: DotNetCoreCLI@2
  displayName: 'Publish API'
  inputs:
    command: 'publish'
    projects: '**/SugarFeet.Api.csproj'
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api'

# =========================
# 7. Install Node
# =========================
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'

# =========================
# 8. Build frontend (SAFE)
# =========================
- script: |
    if [ -d "SugarFeet.Client" ]; then
      cd SugarFeet.Client
      npm install
      npm run build
    else
      echo "Frontend not found"
    fi
  displayName: 'Build Frontend'

# =========================
# 9. Copy frontend ONLY IF EXISTS
# =========================
- script: |
    if [ -d "SugarFeet.Client/.next" ]; then
      mkdir -p $(Build.ArtifactStagingDirectory)/frontend
      cp -r SugarFeet.Client/.next/* $(Build.ArtifactStagingDirectory)/frontend
    else
      echo "No .next folder generated"
    fi
  displayName: 'Copy Frontend Output'

# =========================
# 10. Publish artifact
# =========================
- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'drop'