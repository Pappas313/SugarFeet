trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

steps:

# =========================
# 1. Checkout repo
# =========================
- checkout: self
  clean: true

# =========================
# 2. DEBUG (IMPORTANT - shows structure)
# =========================
- script: |
    echo "===== REPO STRUCTURE ====="
    ls -R
  displayName: 'Debug - Show repo structure'

# =========================
# 3. Install .NET SDK
# =========================
- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    packageType: 'sdk'
    version: '8.x'

# =========================
# 4. RESTORE (SAFE - no .sln required)
# =========================
- task: DotNetCoreCLI@2
  displayName: 'Restore'
  inputs:
    command: 'restore'
    projects: '**/*.csproj'

# =========================
# 5. BUILD ALL PROJECTS
# =========================
- task: DotNetCoreCLI@2
  displayName: 'Build'
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '--configuration $(buildConfiguration) --no-restore'

# =========================
# 6. TEST (optional, does not fail pipeline)
# =========================
- task: DotNetCoreCLI@2
  displayName: 'Test'
  inputs:
    command: 'test'
    projects: '**/*Tests/*.csproj'
    arguments: '--configuration $(buildConfiguration)'
  continueOnError: true

# =========================
# 7. PUBLISH API (auto-detect project)
# =========================
- task: DotNetCoreCLI@2
  displayName: 'Publish API'
  inputs:
    command: 'publish'
    projects: '**/SugarFeet.Api.csproj'
    arguments: >
      --configuration $(buildConfiguration)
      --output $(Build.ArtifactStagingDirectory)/api
      --no-restore

# =========================
# 8. Install Node.js (frontend)
# =========================
- task: NodeTool@0
  displayName: 'Install Node.js'
  inputs:
    versionSpec: '20.x'

# =========================
# 9. BUILD FRONTEND (SAFE)
# =========================
- script: |
    if [ -d "SugarFeet.Client" ]; then
      echo "Frontend found - building..."
      cd SugarFeet.Client
      npm install
      npm run build
    else
      echo "No frontend folder found"
    fi
  displayName: 'Build Frontend'

# =========================
# 10. COPY FRONTEND OUTPUT (SAFE CHECK)
# =========================
- script: |
    if [ -d "SugarFeet.Client/.next" ]; then
      echo "Copying frontend build..."
      mkdir -p $(Build.ArtifactStagingDirectory)/frontend
      cp -r SugarFeet.Client/.next/* $(Build.ArtifactStagingDirectory)/frontend
    else
      echo "No .next output found (skipping)"
    fi
  displayName: 'Copy Frontend Output'

# =========================
# 11. PUBLISH ARTIFACT
# =========================
- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact'
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'drop'