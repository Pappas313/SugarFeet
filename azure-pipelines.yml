trigger:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    displayName: Checkout source

  - task: NodeTool@0
    displayName: Install Node.js (required by Railway CLI)
    inputs:
      versionSpec: '20.x'

  - script: npm install -g @railway/cli
    displayName: Install Railway CLI

  - script: |
      if [ -z "$RAILWAY_TOKEN" ]; then
        echo "##[error]RAILWAY_TOKEN is empty. Add it as a secret pipeline variable."
        exit 1
      fi
      echo "RAILWAY_TOKEN is set (length: ${#RAILWAY_TOKEN})"
    displayName: Verify Railway token
    env:
      RAILWAY_TOKEN: $(RAILWAY_TOKEN)

  - script: railway up --detach
    displayName: Deploy to Railway
    env:
      RAILWAY_TOKEN: $(RAILWAY_TOKEN)
