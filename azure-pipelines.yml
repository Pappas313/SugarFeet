trigger:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

variables:
  # Add RAILWAY_TOKEN as a secret pipeline variable in Azure DevOps:
  # Pipelines → Library → Variable Groups  OR  Edit pipeline → Variables
  - name: RAILWAY_TOKEN
    value: $(RAILWAY_TOKEN)

steps:
  - checkout: self
    displayName: Checkout source

  - task: NodeTool@0
    displayName: Install Node.js (required by Railway CLI)
    inputs:
      versionSpec: '20.x'

  - script: npm install -g @railway/cli
    displayName: Install Railway CLI

  - script: railway up --detach
    displayName: Deploy to Railway
    env:
      RAILWAY_TOKEN: $(RAILWAY_TOKEN)
