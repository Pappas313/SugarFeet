trigger:
  branches:
    include:
      - master

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self
    fetchDepth: 0
    persistCredentials: true

  - script: |
      git config --global user.email "pipeline@sugafeet.com"
      git config --global user.name "Azure DevOps Mirror"

      git remote add github https://$GITHUB_PAT@github.com/Pappas313/SugarFeet.git

      git push github --mirror
    displayName: 'Mirror to GitHub'
    env:
      GITHUB_PAT: $(GITHUB_PAT)