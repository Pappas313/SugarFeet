trigger:
  branches:
    include:
      - '*'

pr: none

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    fetchDepth: 0
    persistCredentials: true

  - bash: |
      set -euo pipefail

      if [ -z "${GITHUB_PAT:-}" ] || [[ "${GITHUB_PAT}" == *'$('* ]]; then
        echo "GITHUB_PAT pipeline variable is missing or not expanded."
        exit 1
      fi

      git config user.email "pipeline@sugarfeet.local"
      git config user.name "Azure DevOps Mirror"

      git remote remove github 2>/dev/null || true
      git remote add github "https://Pappas313:${GITHUB_PAT}@github.com/Pappas313/SugarFeet.git"

      git ls-remote github >/dev/null

      git push --force --prune github 'refs/remotes/origin/*:refs/heads/*'
      git push --force --prune github 'refs/tags/*:refs/tags/*'
    displayName: 'Mirror Azure Repos to GitHub'
    env:
      GITHUB_PAT: $(GITHUB_PAT)