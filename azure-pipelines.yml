diff --git a/C:\Users\hrist\source\repos\SugarFeet\azure-pipelines.yml b/C:\Users\hrist\source\repos\SugarFeet\azure-pipelines.yml
new file mode 100644
--- /dev/null
+++ b/C:\Users\hrist\source\repos\SugarFeet\azure-pipelines.yml
@@ -0,0 +1,37 @@
+trigger:
+  branches:
+    include:
+      - '*'
+
+pr: none
+
+pool:
+  vmImage: 'ubuntu-latest'
+
+variables:
+  AZURE_REPO_URL: 'https://dev.azure.com/FirstStepProjects/SugarFeetProject/_git/SugarFeet'
+  GITHUB_REPO_URL: 'https://github.com/Pappas313/SugarFeet.git'
+
+steps:
+  - checkout: none
+
+  - bash: |
+      set -euo pipefail
+
+      if [ -z "${GITHUB_PAT:-}" ]; then
+        echo "GITHUB_PAT pipeline variable is not set."
+        exit 1
+      fi
+
+      git config --global user.email "pipeline@sugarfeet.local"
+      git config --global user.name "Azure DevOps Mirror"
+
+      git clone --mirror "${AZURE_REPO_URL}" SugarFeet.git
+      cd SugarFeet.git
+
+      git remote add github "https://x-access-token:${GITHUB_PAT}@github.com/Pappas313/SugarFeet.git"
+      git push --mirror github
+    displayName: 'Mirror Azure Repos to GitHub'
+    env:
+      AZURE_REPO_URL: $(AZURE_REPO_URL)
+      GITHUB_PAT: $(GITHUB_PAT)
