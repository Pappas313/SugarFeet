trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

steps:

# =========================
# 1. Checkout
# =========================
- checkout: self
  clean: true

# =========================
# 2. DEBUG (SHOW EXACT STRUCTURE)
# =========================
- script: |
    echo "ROOT FILES:"
    ls -la
    echo "FULL TREE:"
    find .
  displayName: 'Debug repo structure'

# =========================
# 3. GO INTO PROJECT ROOT (IMPORTANT FIX)
# =========================
- script: |
    echo "Moving into project folder..."
    cd SugarFeet || true
    ls -la
  displayName: 'Enter project directory'

# =========================
# 4. Install .NET SDK
# =========================
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

# =========================
# 5. RESTORE (FORCE CORRECT PATH)
# =========================
- task: DotNetCoreCLI@2
  displayName: 'Restore'
  inputs:
    command: 'restore'
    projects: 'SugarFeet/**/*.csproj'

# =========================
# 6. BUILD
# =========================
- task: DotNetCoreCLI@2
  displayName: 'Build'
  inputs:
    command: 'build'
    projects: 'SugarFeet/**/*.csproj'
    arguments: '--configuration $(buildConfiguration)'

# =========================
# 7. PUBLISH API
# =========================
- task: DotNetCoreCLI@2
  displayName: 'Publish API'
  inputs:
    command: 'publish'
    projects: 'SugarFeet/**/SugarFeet.Api.csproj'
    arguments: >
      --configuration $(buildConfiguration)
      --output $(Build.ArtifactStagingDirectory)/api

# =========================
# 8. NODE FRONTEND
# =========================
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'

- script: |
    if [ -d "SugarFeet/SugarFeet.Client" ]; then
      cd SugarFeet/SugarFeet.Client
      npm install
      npm run build
    else
      echo "Frontend not found"
    fi
  displayName: 'Build Frontend'

# =========================
# 9. COPY FRONTEND (SAFE)
# =========================
- script: |
    if [ -d "SugarFeet/SugarFeet.Client/.next" ]; then
      mkdir -p $(Build.ArtifactStagingDirectory)/frontend
      cp -r SugarFeet/SugarFeet.Client/.next/* $(Build.ArtifactStagingDirectory)/frontend
    else
      echo "No frontend build output"
    fi
  displayName: 'Copy Frontend'

# =========================
# 10. PUBLISH ARTIFACT
# =========================
- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'drop'